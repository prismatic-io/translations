version: 2
updates:
  # Roll all non-security version bumps into a single weekly PR. Security
  # updates are not affected by version-update groups and continue to open
  # individually so CVEs stay visible.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    ignore:
      # Node 26 types use TypeScript syntax that our TS 4.1 compatibility
      # check cannot parse. Keep Dependabot on the latest 25.x release until
      # that compatibility guarantee is intentionally dropped.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
      # typescript-* aliases are pinned to specific older versions for the
      # typecheck:compat matrix. Bump manually.
      - dependency-name: "typescript-*"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      all-actions:
        patterns:
          - "*"
